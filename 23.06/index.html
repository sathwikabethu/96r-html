<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>menu card</title>
</head>
<body>
    <!-- Create a Restaurant menu card  using HTML semantic and non semantic lists -->
     <h1>Restaurant Menu Card</h1>

    <h2>Appetizers</h2>
    <ul type="square">
        <li>Spring Rolls</li>
        <li>Garlic Bread</li>
        <li>Bruschetta</li>
    </ul>
    <h2>Main Courses</h2>
    <ol type="a">    
        <li>Grilled Chicken</li>
        <li>Spaghetti Carbonara</li>
        <li>Vegetable Stir Fry</li> 
    </ol>
    <h2>Desserts</h2>
    <ul type="circle" >
        <li>Chocolate Lava Cake</li>
        <li>Cheesecake</li>
        <li>Fruit Salad</li>
    </ul>
    <h2>Beverages</h2>
    <ol type="i">
        <li>Fresh Lemonade</li>
        <li>Iced Tea</li>
        <li>Coffee</li> 
    </ol>
    

    

    
</body>
</html>
